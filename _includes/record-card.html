<article class="record-card" data-category="{{ include.item.category }}">
  <a class="record-card__link" href="{{ include.item.url | relative_url }}">
    <div class="record-card__meta">
      <span>{{ include.item.category | replace: "_", " " | upcase }}</span>
      {% if include.item.date %}<span>{{ include.item.date | date: "%Y.%m.%d" }}</span>{% endif %}
      {% if include.item.location %}<span>{{ include.item.location }}</span>{% endif %}
    </div>

    <div class="record-card__content">
      <h3>{{ include.item.title }}</h3>
      <p>{{ include.item.summary }}</p>
    </div>
  </a>
</article>
