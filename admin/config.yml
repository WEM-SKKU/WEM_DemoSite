local_backend: true

backend:
  name: github
  repo: WEM-SKKU/WEM_DemoSite
  branch: main

publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://wem-skku.github.io/WEM_DemoSite"
display_url: "https://wem-skku.github.io/WEM_DemoSite"

collections:
  - name: "home"
    label: "Home"
    files:
      - file: "index.md"
        label: "Home Page"
        name: "home_page"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "home" }
          - { label: "Title", name: "title", widget: "hidden", default: "WEM" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Hero Kicker", name: "hero_kicker", widget: "string" }
          - { label: "Hero Button Label", name: "hero_button_label", widget: "string" }
          - { label: "Hero Button Link", name: "hero_button_link", widget: "string" }
          - { label: "Intro Heading", name: "intro_heading", widget: "string" }
          - { label: "Intro Body", name: "intro_body", widget: "text" }
          - { label: "Archive Section Heading", name: "archive_section_heading", widget: "string" }
          - { label: "Archive Section Body", name: "archive_section_body", widget: "text" }
          - { label: "Prototype Section Heading", name: "prototype_section_heading", widget: "string" }
          - { label: "Prototype Section Body", name: "prototype_section_body", widget: "text" }
          - { label: "Records Section Heading", name: "records_section_heading", widget: "string" }
          - { label: "Records Section Body", name: "records_section_body", widget: "text" }
          - { label: "Recruit Section Heading", name: "recruit_section_heading", widget: "string" }
          - { label: "Recruit Section Body", name: "recruit_section_body", widget: "text" }
          - { label: "Recruit Button Label", name: "recruit_button_label", widget: "string" }

  - name: "about"
    label: "About"
    files:
      - file: "about.md"
        label: "About Page"
        name: "about_page"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - { label: "Mission Heading", name: "mission_heading", widget: "string" }
          - { label: "Mission Body", name: "mission_body", widget: "markdown" }
          - label: "Focus Areas"
            name: "focus_areas"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - { label: "Achievements", name: "achievements", widget: "list" }
          - label: "Timeline"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "recruit"
    label: "Recruit"
    files:
      - file: "recruit.md"
        label: "Recruit Page"
        name: "recruit_page"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - label: "Status"
            name: "status"
            widget: "select"
            options:
              - { label: "Open", value: "open" }
              - { label: "Closed", value: "closed" }
              - { label: "Coming Soon", value: "coming_soon" }
          - label: "Schedule"
            name: "schedule"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Date Text", name: "date_text", widget: "string" }
          - { label: "Targets", name: "targets", widget: "list" }
          - { label: "What We Seek", name: "what_we_seek", widget: "list" }
          - label: "Process Steps"
            name: "process_steps"
            widget: "list"
            fields:
              - { label: "Step", name: "step", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "FAQ"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }
          - { label: "Apply Button Label", name: "apply_label", widget: "string" }
          - { label: "Apply URL", name: "apply_url", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "contact"
    label: "Contact"
    files:
      - file: "contact.md"
        label: "Contact Page"
        name: "contact_page"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Secondary Email", name: "secondary_email", widget: "string", required: false }
          - { label: "Contact Note", name: "contact_note", widget: "markdown" }
          - label: "External Links"
            name: "external_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "site_settings"
    label: "Site Settings"
    files:
      - file: "_data/site.yml"
        label: "Global Site Settings"
        name: "site_data"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Site Tagline", name: "site_tagline", widget: "string" }
          - { label: "Institution", name: "institution", widget: "string" }
          - { label: "Default Email", name: "default_email", widget: "string" }
          - { label: "SEO Title", name: "seo_title", widget: "string" }
          - { label: "SEO Description", name: "seo_description", widget: "text" }
          - { label: "Hero Left Word", name: "hero_left_word", widget: "string" }
          - { label: "Hero Right Word", name: "hero_right_word", widget: "string" }
          - { label: "Hero Left Meta", name: "hero_left_meta", widget: "list" }
          - { label: "Hero Right Meta", name: "hero_right_meta", widget: "list" }
          - { label: "System Status Label", name: "system_status_label", widget: "string" }
          - { label: "Footer Note", name: "footer_note", widget: "string" }
          - label: "Social Links"
            name: "social_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string", required: false }

  - name: "team"
    label: "Team"
    files:
      - file: "_data/team.yml"
        label: "Team Members"
        name: "team_data"
        fields:
          - label: "Members"
            name: "members"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Portfolio URL", name: "portfolio_url", widget: "string", required: false }
              - { label: "Order", name: "order", widget: "number", value_type: "int" }

  - name: "archive_works"
    label: "Archive Works"
    label_singular: "Archive Work"
    folder: "_works"
    create: true
    filter: { field: "track", value: "archive" }
    slug: "{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "work" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Track", name: "track", widget: "hidden", default: "archive" }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Released", value: "released" }
          - { label: "Submitted", value: "submitted" }
          - { label: "Exhibited", value: "exhibited" }
          - { label: "Archived", value: "archived" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Interactive Cinema", value: "interactive_cinema" }
          - { label: "Functional Game", value: "functional_game" }
          - { label: "Exhibition", value: "exhibition" }
          - { label: "Other", value: "other" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - { label: "Featured on Home", name: "featured_home", widget: "boolean", default: false }
      - { label: "Home Order", name: "home_order", widget: "number", value_type: "int", required: false }
      - { label: "Thumbnail", name: "thumbnail", widget: "image" }
      - { label: "Hero Image", name: "hero_image", widget: "image" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Tagline", name: "tagline", widget: "string", required: false }
      - { label: "Result Note", name: "result_note", widget: "string", required: false }
      - { label: "Video URL", name: "video_url", widget: "string", required: false }
      - { label: "External URL", name: "external_url", widget: "string", required: false }
      - { label: "PDF File", name: "pdf_file", widget: "file", required: false }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - label: "Credits"
        name: "credits"
        widget: "list"
        required: false
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role", name: "role", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "prototype_works"
    label: "Prototype Works"
    label_singular: "Prototype Work"
    folder: "_works"
    create: true
    filter: { field: "track", value: "prototype" }
    slug: "{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "work" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Track", name: "track", widget: "hidden", default: "prototype" }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Concept", value: "concept" }
          - { label: "In Progress", value: "in_progress" }
          - { label: "Testing", value: "testing" }
          - { label: "Planned", value: "planned" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - { label: "Interactive Cinema", value: "interactive_cinema" }
          - { label: "Functional Game", value: "functional_game" }
          - { label: "Exhibition", value: "exhibition" }
          - { label: "Other", value: "other" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - { label: "Featured on Home", name: "featured_home", widget: "boolean", default: false }
      - { label: "Home Order", name: "home_order", widget: "number", value_type: "int", required: false }
      - { label: "Thumbnail", name: "thumbnail", widget: "image" }
      - { label: "Hero Image", name: "hero_image", widget: "image" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Tagline", name: "tagline", widget: "string", required: false }
      - { label: "Research Focus", name: "research_focus", widget: "text", required: false }
      - { label: "Current Stage Note", name: "current_stage_note", widget: "text", required: false }
      - { label: "Next Step", name: "next_step", widget: "text", required: false }
      - { label: "Target Window", name: "target_window", widget: "string", required: false }
      - { label: "Video URL", name: "video_url", widget: "string", required: false }
      - { label: "External URL", name: "external_url", widget: "string", required: false }
      - { label: "PDF File", name: "pdf_file", widget: "file", required: false }
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
      - label: "Credits"
        name: "credits"
        widget: "list"
        required: false
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role", name: "role", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "records"
    label: "Records"
    label_singular: "Record"
    folder: "_records"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "record" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Exhibition", value: "exhibition" }
          - { label: "Competition", value: "competition" }
          - { label: "Workshop", value: "workshop" }
          - { label: "Update", value: "update" }
          - { label: "News", value: "news" }
      - { label: "Featured on Home", name: "featured_home", widget: "boolean", default: false }
      - { label: "Home Order", name: "home_order", widget: "number", value_type: "int", required: false }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "External URL", name: "external_url", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
