<section class="recruit-strip">
  <div>
    <p class="eyebrow">RECRUIT</p>
    <h2>{{ home.recruit_section_heading }}</h2>
    <p>{{ home.recruit_section_body }}</p>
  </div>

  <div class="recruit-strip__status">
    <div class="status-badge status-badge--{{ page.status }}">
      {{ page.status | upcase }}
    </div>
    {% if page.schedule and page.schedule[0] %}
      <p><strong>{{ page.schedule[0].label }}</strong> {{ page.schedule[0].date_text }}</p>
    {% endif %}
    <a class="button button--light" href="{{ '/recruit/' | relative_url }}">{{ home.recruit_button_label }}</a>
  </div>
</section>
